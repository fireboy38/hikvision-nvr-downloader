name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '发布类型'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - stable
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build EXE (ISAPI mode, no SDK DLL)
      run: |
        cd hikvision_downloader
        python -m PyInstaller --noconfirm --clean build_github.spec

    - name: Create output directory
      run: |
        New-Item -ItemType Directory -Path "dist/四川新数录像批量下载器_ISAPI版/_internal" -Force -ErrorAction SilentlyContinue

    - name: Copy EXE
      run: |
        $src = "hikvision_downloader/dist/四川新数录像批量下载器/四川新数录像批量下载器.exe"
        if (Test-Path $src) {
          Copy-Item $src "dist/四川新数录像批量下载器_ISAPI版/" -Force
        }

    - name: Copy _internal
      run: |
        $src = "hikvision_downloader/dist/四川新数录像批量下载器/_internal"
        if (Test-Path $src) {
          Copy-Item "$src/*" "dist/四川新数录像批量下载器_ISAPI版/_internal/" -Recurse -Force
        }

    - name: Get version info
      id: version
      run: |
        $date = Get-Date -Format "yyyy-MM-dd"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        echo "date=$date" >> $env:GITHUB_OUTPUT
        echo "sha=$shortSha" >> $env:GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 四川新数录像批量下载器-ISAPI版
        path: dist/四川新数录像批量下载器_ISAPI版/
        retention-days: 30

    - name: Create zip for release
      run: |
        cd dist
        Compress-Archive -Path "四川新数录像批量下载器_ISAPI版/*" -DestinationPath "四川新数录像批量下载器_ISAPI版.zip" -Force

    - name: Delete old nightly release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'nightly'
      run: |
        gh release delete nightly --yes --cleanup-tag=false || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Nightly Release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'nightly'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: nightly
        name: Nightly Build (${{ steps.version.outputs.date }})
        body: |
          ## 自动构建版本 (ISAPI模式)

          **构建时间**: ${{ steps.version.outputs.date }}
          **提交**: ${{ steps.version.outputs.sha }}

          ### 下载内容
          - `四川新数录像批量下载器_ISAPI版.zip`
          - **推荐使用 ISAPI 模式**（无需SDK）

          ### 使用方法
          1. 解压到任意目录
          2. 运行 `四川新数录像批量下载器.exe`
          3. **推荐使用 ISAPI 模式**

          ### 功能支持
          | 模式 | 支持情况 |
          |------|---------|
          | ISAPI模式 | ✅ 完全支持（推荐） |
          | SDK模式 | ❌ 不支持（需本地完整打包） |
          | HikLoad模式 | ✅ 完全支持 |

          > **注意**: 这是自动构建版本。
        files: dist/四川新数录像批量下载器_ISAPI版.zip
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Stable Release
      if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'stable')
      uses: softprops/action-gh-release@v1
      with:
        name: 四川新数录像批量下载器 ${{ github.ref_name || steps.version.outputs.date }}
        body: |
          ## 四川新数录像批量下载器

          **构建时间**: ${{ steps.version.outputs.date }}
          **版本**: ${{ github.ref_name || 'Stable Build' }}

          ### 下载内容
          - `四川新数录像批量下载器_ISAPI版.zip`

          ### 功能说明
          - **ISAPI模式**: ✅ 完全支持（推荐）
          - **SDK模式**: ❌ 需本地完整打包
          - **HikLoad模式**: ✅ 完全支持

          ### 更新日志
          请查看 [commits](https://github.com/${{ github.repository }}/commits/main) 了解详情。
        files: dist/四川新数录像批量下载器_ISAPI版.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
