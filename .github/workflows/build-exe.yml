name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed `
          --name "四川新数录像批量下载器" `
          --paths "hikvision_downloader" `
          --hidden-import PyQt5 `
          --hidden-import PyQt5.sip `
          --hidden-import requests `
          --hidden-import urllib3 `
          --hidden-import xml.etree.ElementTree `
          --hidden-import xml.etree.cElementTree `
          --hidden-import json `
          --hidden-import datetime `
          --hidden-import os `
          --hidden-import sys `
          --hidden-import subprocess `
          --hidden-import threading `
          --hidden-import time `
          --hidden-import re `
          --hidden-import pathlib `
          --hidden-import typing `
          --hidden-import dataclasses `
          --hidden-import gui `
          --hidden-import gui.main_window `
          --hidden-import core `
          --hidden-import core.downloader `
          --hidden-import core.java_downloader `
          --hidden-import core.nvr_api `
          --hidden-import core.hcnetsdk `
          --hidden-import core.channel_manager `
          --hidden-import core.device_info `
          --hidden-import core.hikload_downloader `
          --hidden-import core.isapi_downloader `
          --hidden-import core.osd_manager `
          --hidden-import utils `
          --hidden-import utils.logger `
          hikvision_downloader/main.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 四川新数录像批量下载器-Windows
        path: dist/四川新数录像批量下载器.exe
        
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $env:GITHUB_OUTPUT
        
    - name: Create/Update Nightly Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: nightly
        name: Nightly Build (${{ steps.date.outputs.date }})
        body: |
          自动构建的最新版本
          
          构建时间: ${{ steps.date.outputs.date }}
          提交: ${{ github.sha }}
          
          ## 使用方法
          1. 下载 `四川新数录像批量下载器.exe`
          2. 双击运行即可
          
          ## 注意
          这是自动构建版本，可能包含最新但未经充分测试的功能。
        files: dist/四川新数录像批量下载器.exe
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create Stable Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/四川新数录像批量下载器.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
